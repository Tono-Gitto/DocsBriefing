<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TG921 Preflight Briefing</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(20, 20, 40, 0.96);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 18px;
      border-bottom: 1px solid #334;
    }
    #header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.05em; color: #a0c8ff; }
    #header span { font-size: 0.85rem; color: #778; }

    /* ── Map ── */
    #map {
      position: fixed;
      top: 58px; left: 0; bottom: 0;
      right: 0;
      transition: right 0.25s ease;
    }
    body.panel-open #map { right: 380px; }

    .leaflet-tile { filter: brightness(0.85) saturate(0.7); }

    /* ── Weather panel ── */
    #panel {
      position: fixed;
      top: 58px; right: -380px; bottom: 0;
      width: 380px;
      background: #12132a;
      border-left: 1px solid #2a2d50;
      overflow-y: auto;
      overscroll-behavior: contain;
      transition: right 0.25s ease;
      z-index: 900;
      display: flex; flex-direction: column;
    }
    body.panel-open #panel { right: 0; }

    /* 44×44 touch target for close button */
    .panel-close {
      position: absolute; top: 8px; right: 8px;
      cursor: pointer; touch-action: manipulation;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: #778;
      border-radius: 8px;
    }
    .panel-close:hover { color: #aac; background: #1e2048; }
    .panel-close:active { background: #252860; }

    .panel-head {
      padding: 20px 18px 14px;
      border-bottom: 1px solid #1e2248;
    }
    .panel-icao {
      font-size: 1.4rem; font-weight: 700;
      color: #a0c8ff; letter-spacing: 0.04em;
    }
    .panel-name { font-size: 0.9rem; color: #889; margin-top: 4px; }
    .panel-ref  { font-size: 0.82rem; color: #667; margin-top: 8px; }

    .panel-section { padding: 14px 18px; border-bottom: 1px solid #1a1d3a; }
    .panel-label {
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.1em; color: #667;
      text-transform: uppercase; margin-bottom: 7px;
    }
    .panel-value {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 0.85rem; color: #c8d8f0;
      line-height: 1.55; white-space: pre-wrap; word-break: break-all;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.08em; padding: 3px 8px;
      border-radius: 4px; margin-bottom: 6px;
      text-transform: uppercase;
    }
    .badge-becmg  { background: #1a3a5a; color: #60b0ff; }
    .badge-tempo  { background: #3a2a10; color: #ffb040; }
    .badge-prob   { background: #2a1a3a; color: #c080ff; }
    .badge-window { font-size: 0.72rem; color: #778; margin-left: 6px; }

    /* NOTAM tier badges */
    .badge-t1 { background: #4a1010; color: #ff8080; }
    .badge-t2 { background: #3a2a00; color: #ffc060; }
    .badge-t3 { background: #1e1e2e; color: #667; }

    .notam-row {
      padding: 9px 0;
      border-bottom: 1px solid #191c38;
    }
    .notam-row:last-child { border-bottom: none; }
    .notam-header {
      display: flex; align-items: baseline; gap: 6px;
      flex-wrap: wrap; margin-bottom: 4px;
    }
    .notam-id { font-size: 0.7rem; color: #667; font-family: monospace; }
    .notam-window { font-size: 0.68rem; color: #667; }
    .notam-body {
      font-size: 0.82rem; color: #b8c8e0;
      line-height: 1.5;
    }

    .no-data { font-size: 0.82rem; color: #445; font-style: italic; }

    /* Runway chips in panel header */
    .rwy-chip {
      display: inline-flex; align-items: baseline; gap: 4px;
      background: #0e1e32; border: 1px solid #1e3a5a;
      border-radius: 5px; padding: 2px 7px;
      margin: 2px 4px 2px 0;
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 0.78rem; white-space: nowrap;
    }
    .rwy-name { color: #8ec8ff; }
    .rwy-len  { color: #4a6a8a; font-size: 0.72rem; }
    .rwy-chip[data-tier="1"] {
      border-color: #ff8080;
      box-shadow: 0 0 7px rgba(255,128,128,0.40);
      cursor: pointer;
    }
    .rwy-chip[data-tier="2"] {
      border-color: #ffc060;
      box-shadow: 0 0 7px rgba(255,192,96,0.30);
      cursor: pointer;
    }
    .notam-row { transition: background 1.5s ease-out; }
    .notam-flash { background: rgba(160,200,255,0.14); }
    .rwy-chip.rwy-chip-active {
      background: #1a2e4a; border-color: #60a8ff;
      box-shadow: 0 0 10px rgba(96,168,255,0.50);
    }
    .rwy-chip[data-tier].rwy-chip-dimmed { opacity: 0.30; }
    .notam-filter-clear {
      cursor: pointer; color: #60a8ff;
      font-weight: normal; text-transform: none;
      letter-spacing: 0; margin-left: 6px; font-size: 0.68rem;
    }

    /* 44px min-height touch target for "show N more" */
    .t3-expand {
      font-size: 0.78rem; color: #556; cursor: pointer; touch-action: manipulation;
      min-height: 44px; display: flex; align-items: center; justify-content: center;
      border-top: 1px solid #191c38;
    }
    .t3-expand:hover { color: #a0c8ff; }
    .t3-expand:active { background: #161830; }

    /* ── Status chip ── */
    #status {
      position: fixed; bottom: 16px; right: 16px; z-index: 1000;
      background: rgba(20,20,40,0.90); padding: 7px 14px;
      border-radius: 6px; font-size: 0.78rem; color: #667;
    }
    body.panel-open #status { right: 396px; }

    /* ── Leaflet popup (used for DEP/DEST) ── */
    .leaflet-popup-content-wrapper {
      background: #1e2340; border: 1px solid #3a4060;
      border-radius: 6px; color: #dde;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .leaflet-popup-tip { background: #1e2340; }
    .leaflet-popup-content { margin: 12px 16px; }
    .pu-icao { font-size: 1.05rem; font-weight: 700; color: #a0c8ff; }
    .pu-name { font-size: 0.82rem; color: #99a; margin-top: 3px; }

    /* ── Leaflet tooltip (hover label) ── */
    .leaflet-tooltip {
      background: rgba(18,20,44,0.92);
      border: 1px solid #3a4060;
      color: #a0c8ff;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 5px;
      box-shadow: none;
      white-space: nowrap;
    }
    .leaflet-tooltip::before { display: none; }
  </style>
</head>
<body>

<div id="header">
  <h1 id="hdr-title">Preflight Briefing</h1>
  <span id="hdr-sub"></span>
</div>

<div id="map"></div>

<!-- Weather side panel -->
<div id="panel">
  <div class="panel-close" onclick="closePanel()">✕</div>
  <div id="panel-content"></div>
</div>

<div id="status">Loading…</div>

<script>
let _activeRwyFilter = null;

const map = L.map("map", { center: [30, 60], zoom: 3 });

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18,
}).addTo(map);

// ── Panel ──────────────────────────────────────────────────────────────────
function openPanel(data, type) {
  clearNotamFilter();
  const c = document.getElementById("panel-content");
  c.innerHTML = type === "fir" ? buildFirPanel(data) : buildPanel(data);
  document.body.classList.add("panel-open");
  map.invalidateSize();
}

function expandT3(uid, btn) {
  document.getElementById(uid + "-more").style.display = "";
  btn.style.display = "none";
}
function closePanel() {
  document.body.classList.remove("panel-open");
  map.invalidateSize();
}

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function buildChips(runway_info, notams) {
  const rwyRe = /\bRWY\s+(\d{2}[LCR]?(?:\/\d{2}[LCR]?)?)/gi;
  const pairs = (runway_info || '').match(/\d{2}[LCR]?\/\d{2}[LCR]?\s+\d+/g) || [];
  if (!pairs.length) return esc(runway_info);

  return pairs.map(p => {
    const [rwy, len] = p.split(/\s+/);
    const ends = rwy.split('/');
    const chipExact   = new Set(ends);
    const chipNumeric = new Set(ends.map(e => e.replace(/[LCR]$/, '')));

    let bestTier = null;
    const matchedIds = [];

    for (const n of (notams || [])) {
      if (n.tier > 2) continue;
      const text = (n.summary || '') + ' ' + (n.body || '');
      let m; rwyRe.lastIndex = 0;
      let hit = false;
      while ((m = rwyRe.exec(text)) !== null) {
        for (const tok of m[1].toUpperCase().split('/')) {
          if (/[LCR]$/.test(tok)) {
            if (chipExact.has(tok))   { hit = true; break; }
          } else {
            if (chipNumeric.has(tok)) { hit = true; break; }
          }
        }
        if (hit) break;
      }
      if (hit) {
        matchedIds.push(n.id);
        if (bestTier === null || n.tier < bestTier) bestTier = n.tier;
      }
    }

    const tierAttr = bestTier ? `data-tier="${bestTier}"` : '';
    const clickAttr = matchedIds.length
      ? `onclick='filterNotams(${JSON.stringify(matchedIds)},"${rwy}")'`
      : '';
    return `<span class="rwy-chip" ${tierAttr} ${clickAttr}><span class="rwy-name">${rwy}</span><span class="rwy-len">${len}m</span></span>`;
  }).join('');
}

function filterNotams(ids, rwy) {
  if (_activeRwyFilter && _activeRwyFilter.rwy === rwy) {
    clearNotamFilter();
    return;
  }

  _activeRwyFilter = { rwy, ids };
  const idSet = new Set(ids.map(id => 'notam-' + id.replace(/[^a-zA-Z0-9]/g, '_')));

  document.querySelectorAll('.notam-row').forEach(row => {
    row.style.display = idSet.has(row.id) ? '' : 'none';
  });

  const label = document.getElementById('notam-label');
  if (label) {
    label.innerHTML = `NOTAMs for RWY ${rwy}<span class="notam-filter-clear" onclick="clearNotamFilter()">× show all</span>`;
  }

  document.querySelectorAll('.rwy-chip').forEach(chip => {
    const chipRwy = chip.querySelector('.rwy-name')?.textContent;
    chip.classList.toggle('rwy-chip-active', chipRwy === rwy);
    chip.classList.toggle('rwy-chip-dimmed', !!chip.dataset.tier && chipRwy !== rwy);
  });

  const panel = document.getElementById('panel');
  const first = [...document.querySelectorAll('.notam-row')].find(r => idSet.has(r.id));
  if (first) panel.scrollTop = first.offsetTop - 80;
}

function clearNotamFilter() {
  _activeRwyFilter = null;

  document.querySelectorAll('.notam-row').forEach(row => { row.style.display = ''; });

  const label = document.getElementById('notam-label');
  if (label) label.innerHTML = label.dataset.original || 'NOTAMs';

  document.querySelectorAll('.rwy-chip').forEach(chip => {
    chip.classList.remove('rwy-chip-active', 'rwy-chip-dimmed');
  });
}

function badgeClass(type) {
  if (!type) return "badge-becmg";
  const t = type.toUpperCase();
  if (t.includes("TEMPO")) return "badge-tempo";
  if (t.includes("PROB"))  return "badge-prob";
  return "badge-becmg";
}

function buildPanel(ap) {
  const distLabel = ap.dist_nm < 120
    ? `~${ap.dist_nm} nm from track`
    : `~${ap.dist_nm} nm (regional)`;

  let html = `
    <div class="panel-head">
      <div class="panel-icao">${esc(ap.icao)} / ${esc(ap.iata)}</div>
      <div class="panel-name" style="line-height:2">${ap.runway_info ? buildChips(ap.runway_info, ap.notams) : esc(ap.name)}</div>
      <div class="panel-ref">Ref: ${esc(ap.ref_time)} · ${distLabel}</div>
    </div>`;

  // TAF base conditions
  html += `<div class="panel-section">
    <div class="panel-label">Conditions at ${esc(ap.ref_time)}</div>`;
  if (ap.taf_base) {
    html += `<div class="panel-value">${esc(ap.taf_base)}</div>`;
  } else {
    html += `<div class="no-data">No TAF</div>`;
  }
  html += `</div>`;

  // BECMG in progress
  if (ap.becmg_in_progress) {
    const b = ap.becmg_in_progress;
    html += `<div class="panel-section">
      <div class="panel-label">BECMG in progress</div>
      <span class="badge badge-becmg">BECMG</span>
      <span class="badge-window">${esc(b.window)}</span>
      <div class="panel-value" style="margin-top:5px">${esc(b.text)}</div>
    </div>`;
  }

  // Active TEMPOs / PROBs
  if (ap.active_overlays && ap.active_overlays.length > 0) {
    ap.active_overlays.forEach(ov => {
      html += `<div class="panel-section">
        <span class="badge ${badgeClass(ov.type)}">${esc(ov.type)}</span>
        <span class="badge-window">${esc(ov.window)}</span>
        <div class="panel-value" style="margin-top:5px">${esc(ov.text)}</div>
      </div>`;
    });
  }

  // NOTAMs
  html += buildNotamSection(ap);

  return html;
}

function compactWindow(w) {
  if (!w) return "";
  // "19 Jun 2026 17:00Z – 20 Jun 2026 23:30Z" → "19Jun 1700–20Jun 2330Z"
  const m = w.match(/(\d+)\s+(\w+)\s+\d+\s+(\d+):(\d+)Z\s+–\s+(\d+)\s+(\w+)\s+\d+\s+(\d+):(\d+)Z/);
  if (!m) return w;
  const [, d1, mo1, h1, mi1, d2, mo2, h2, mi2] = m;
  const same = mo1 === mo2;
  const from = `${d1}${mo1.slice(0,3)} ${h1}${mi1}`;
  const to   = same && d1 === d2 ? `${h2}${mi2}Z` : `${d2}${mo2.slice(0,3)} ${h2}${mi2}Z`;
  return `${from}–${to}`;
}


function notamRow(n) {
  const tierClass = n.tier === 1 ? "badge-t1" : n.tier === 2 ? "badge-t2" : "badge-t3";
  const tierLabel = n.tier === 1 ? "T1" : n.tier === 2 ? "T2" : "T3";
  const win = compactWindow(n.window);
  const safeId = 'notam-' + n.id.replace(/[^a-zA-Z0-9]/g, '_');
  let row = `<div class="notam-row" id="${safeId}"><div class="notam-header">
      <span class="badge ${tierClass}">${tierLabel}</span>
      <span class="notam-id">${esc(n.id)}</span>`;
  if (win) row += `<span class="notam-window">${esc(win)}</span>`;
  row += `</div><div class="notam-body">${esc(n.summary || n.body)}</div></div>`;
  return row;
}

function buildNotamSection(ap) {
  const notams = ap.notams || [];
  const covered = ap.notam_covered;

  const labelText = `NOTAMs active at ${esc(ap.ref_time)}`;
  let html = `<div class="panel-section">
    <div class="panel-label" id="notam-label" data-original="${labelText}">${labelText}</div>`;

  if (notams.length === 0) {
    if (covered) {
      html += `<div class="no-data">No active NOTAMs at ref time</div>`;
    } else {
      html += `<div class="no-data">Airport not in NOTAM brief</div>`;
    }
    return html + `</div>`;
  }

  notams.forEach(n => { html += notamRow(n); });
  return html + `</div>`;
}

function buildFirPanel(f) {
  let html = `<div class="panel-head">
    <div class="panel-icao">${esc(f.fir)}</div>
    <div class="panel-name">${esc(f.name)}</div>
    <div class="panel-ref">Ref: ${esc(f.ref_time)}</div>
  </div>`;
  html += buildFirNotamSection(f);
  return html;
}

function buildFirNotamSection(f) {
  const notams = f.notams || [];
  let html = `<div class="panel-section">
    <div class="panel-label">FIR NOTAMs active at ${esc(f.ref_time)}</div>`;

  if (notams.length === 0) {
    return html + `<div class="no-data">No active FIR NOTAMs</div></div>`;
  }

  const t1t2 = notams.filter(n => n.tier < 3);
  const t3   = notams.filter(n => n.tier === 3);

  t1t2.forEach(n => { html += notamRow(n); });

  if (t3.length <= 5) {
    t3.forEach(n => { html += notamRow(n); });
  } else {
    t3.slice(0, 5).forEach(n => { html += notamRow(n); });
    const uid = `t3-${f.fir}`;
    html += `<div id="${uid}-more" style="display:none">`;
    t3.slice(5).forEach(n => { html += notamRow(n); });
    html += `</div>
      <div class="t3-expand" onclick="expandT3('${uid}', this)">
        show ${t3.length - 5} more T3 ▾
      </div>`;
  }

  return html + `</div>`;
}

// ── Icons ──────────────────────────────────────────────────────────────────
function circleIcon(color, size) {
  return L.divIcon({
    className: "",
    html: `<div style="
      width:${size}px;height:${size}px;border-radius:50%;
      background:${color};border:2px solid rgba(255,255,255,0.5);
      box-shadow:0 0 8px ${color}88;cursor:pointer;"></div>`,
    iconSize:   [size, size],
    iconAnchor: [size / 2, size / 2],
  });
}

function firIcon(color) {
  // 36×36 transparent hit area wraps a 16×16 visible diamond — easier to tap on touch
  return L.divIcon({
    className: "",
    html: `<div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
             <div style="width:16px;height:16px;background:${color};
             transform:rotate(45deg);border:2px solid rgba(255,255,255,0.55);
             box-shadow:0 0 8px ${color}88;"></div></div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
  });
}

const ICON_DEP  = circleIcon("#4cff91", 26);
const ICON_DEST = circleIcon("#ff6b6b", 26);
const ICON_MET  = circleIcon("#a0c8ff", 20);

// ── Route polyline ─────────────────────────────────────────────────────────
fetch("data/route.json")
  .then(r => r.json())
  .then(wps => {
    const lls = wps.map(w => [w.lat, w.lon]);
    L.polyline(lls, { color: "#5b9ef4", weight: 2.5, opacity: 0.85 }).addTo(map);
    map.fitBounds(L.latLngBounds(lls), { padding: [40, 40] });
    document.getElementById("status").textContent = `Route: ${wps.length} waypoints`;
  })
  .catch(e => {
    document.getElementById("status").textContent = "Route load failed: " + e.message;
  });

// ── Flight info + MET airports (loaded together so dep/dest colors are always correct) ──
Promise.all([
  fetch("data/flight_info.json").then(r => r.json()).catch(() => ({ dep: "", dest: "" })),
  fetch("data/airports.json").then(r => r.json()),
]).then(([fi, airports]) => {
  document.getElementById("hdr-title").textContent =
    fi.flight ? `${fi.flight} — ${fi.dep} → ${fi.dest}` : "Preflight Briefing";
  document.getElementById("hdr-sub").textContent =
    fi.date ? `${fi.date} · ${fi.acft} · ${fi.reg}` : "";
  if (fi.flight) document.title = `${fi.flight} Preflight Briefing`;

  airports.forEach(ap => {
    const isDep  = ap.icao === fi.dep;
    const isDest = ap.icao === fi.dest;
    const icon   = isDep ? ICON_DEP : isDest ? ICON_DEST : ICON_MET;
    const offset = (isDep || isDest) ? [0, -12] : [0, -9];

    L.marker([ap.lat, ap.lon], { icon, zIndexOffset: (isDep || isDest) ? 100 : 0 })
      .bindTooltip(ap.icao, { direction: "top", offset })
      .on("click", () => openPanel(ap))
      .addTo(map);
  });
}).catch(e => console.error("Airports load failed:", e));

// ── FIR markers ───────────────────────────────────────────────────────────────
fetch("data/fir_notams.json")
  .then(r => r.json())
  .then(firs => {
    firs.filter(f => f.notams.length > 0).forEach(f => {
      const color = f.notams.some(n => n.tier === 1) ? "#ff8080" : "#1a1a2e";
      L.marker([f.lat, f.lon], { icon: firIcon(color), zIndexOffset: 50 })
        .bindTooltip(`${f.fir} — ${f.name} (${f.notams.length})`, { direction: "top", offset: [0, -8] })
        .on("click", () => openPanel(f, "fir"))
        .addTo(map);
    });
  })
  .catch(e => console.error("FIR load failed:", e));
</script>
</body>
</html>
