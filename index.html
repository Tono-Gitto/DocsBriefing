<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preflight Briefing</title>

  <link rel="stylesheet" href="/static/leaflet.css" />
  <script src="/static/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; }

    :root { --panel-w: 440px; --src-w: 50vw; }
    @media (max-width: 900px) {
      :root { --panel-w: min(75vw, 560px); }
      /* Narrow viewports: Source Pane stacks above the map instead of beside it */
      #srcPane {
        left: 0; right: 0; width: auto;
        top: 58px; bottom: auto; height: 50vh;
        border-right: none; border-bottom: 1px solid #2a2d50;
        transform: translateY(-100%);
      }
      body.src-open #srcPane { transform: translateY(0); }
      body.src-open #map { left: 0; top: calc(58px + 50vh); }
    }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(20, 20, 40, 0.96);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 18px;
      border-bottom: 1px solid #334;
    }
    #header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.05em; color: #a0c8ff; }
    #header span { font-size: 0.85rem; color: #778; }

    /* ── Map ── */
    #map {
      position: fixed;
      top: 58px; left: 0; bottom: 0;
      right: 0;
      transition: right 0.25s ease, left 0.25s ease, top 0.25s ease;
    }
    body.panel-open #map { right: var(--panel-w); }
    body.src-open   #map { left: var(--src-w); }

    .leaflet-tile { filter: brightness(0.85) saturate(0.7); }

    /* ── Weather panel ── */
    #panel {
      position: fixed;
      top: 58px; right: calc(-1 * var(--panel-w)); bottom: 0;
      width: var(--panel-w);
      background: #12132a;
      border-left: 1px solid #2a2d50;
      transition: right 0.25s ease;
      z-index: 900;
      display: flex; flex-direction: column;
    }
    body.panel-open #panel { right: 0; }
    #panel-content {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    #panel-nav {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-top: 1px solid #1e2248;
      background: #12132a;
      min-height: 50px;
    }
    .nav-btn {
      background: #1a1d3a;
      border: 1px solid #2a2d50;
      border-radius: 7px;
      color: #a0c8ff;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 10px 16px;
      cursor: pointer;
      touch-action: manipulation;
      max-width: 45%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .nav-btn:hover  { background: #22254a; border-color: #404880; }
    .nav-btn:active { background: #2a2e58; }

    /* ── Source Pane (original MET + NOTAM PDFs, click-to-highlight) ── */
    #srcPane {
      position: fixed;
      top: 58px; left: 0; bottom: 0;
      width: var(--src-w);
      background: #0d0e1c;
      border-right: 1px solid #2a2d50;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 850;
      display: flex; flex-direction: column;
    }
    body.src-open #srcPane { transform: translateX(0); }
    #srcPane-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #1e2248;
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
      color: #778; text-transform: uppercase;
    }
    #srcPane-close {
      cursor: pointer; touch-action: manipulation;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      color: #778; border-radius: 6px;
    }
    #srcPane-close:hover { color: #aac; background: #1e2048; }

    /* Two Document Sections: MET (25%) on top, NOTAM (75%) below on wide screens.
       A section only renders if its anchors JSON loaded (.src-doc-hidden). */
    #srcSections { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .src-doc-section {
      display: flex; flex-direction: column;
      border-bottom: 1px solid #1e2248;
      min-height: 0;
    }
    .src-doc-section:last-child { border-bottom: none; }
    .src-doc-section.src-doc-hidden { display: none; }
    .src-doc-section[data-doc="met"]   { flex: 0 0 25%; }
    .src-doc-section[data-doc="notam"] { flex: 1 1 auto; }

    .src-doc-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; min-height: 44px;
      cursor: pointer; touch-action: manipulation;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em;
      color: #778; text-transform: uppercase;
      background: #10112a;
    }
    .src-doc-header:hover { color: #aac; }
    .src-doc-title { display: flex; align-items: center; gap: 6px; }
    .src-doc-chevron { display: inline-block; transition: transform 0.2s ease; font-size: 0.7rem; }
    .src-doc-section.src-collapsed .src-doc-chevron { transform: rotate(-90deg); }
    .src-doc-legend {
      display: none; align-items: center; gap: 10px;
      font-size: 0.66rem; font-weight: 600; letter-spacing: 0.02em;
      text-transform: none; color: #99a;
    }
    .src-doc-legend.show { display: flex; }
    .src-doc-legend .swatch {
      display: inline-block; width: 8px; height: 8px; border-radius: 2px;
      margin-right: 3px; vertical-align: middle;
    }

    .src-doc-stack {
      flex: 1; overflow-y: auto; overscroll-behavior: contain;
      padding: 10px; display: flex; flex-direction: column; gap: 10px;
      min-height: 0;
    }
    .src-page { position: relative; width: 100%; background: #fff; }
    .src-page img { display: block; width: 100%; height: auto; }
    .src-highlight {
      position: absolute;
      border: 3px solid #4a7cf0;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(74,124,240,0.55);
      pointer-events: none;
    }
    /* ETA-window fills (MET only): translucent leg-colored rects layered inside
       a highlighted MET Block over the TAF groups relevant at each leg's ETA±1h. */
    .src-fill {
      position: absolute;
      border-radius: 2px;
      pointer-events: none;
    }
    /* Baseline ("at ETA") token fills: same translucent leg color as .src-fill,
       but a thicker solid border distinguishes "holds at ETA" from the ETA±1h
       window fills above. */
    .src-fill-base {
      border-width: 2px;
      border-style: solid;
    }
    /* Narrow viewports: accordion — the expanded section fills the 50vh band;
       JS (_isNarrow / _setSectionCollapsed) enforces exactly one open. */
    @media (max-width: 900px) {
      .src-doc-section[data-doc="met"],
      .src-doc-section[data-doc="notam"] { flex: 1 1 auto; }
    }
    /* Collapsed section: header only. !important so this always wins over the
       flex-basis rules above regardless of viewport (equal-specificity ties
       would otherwise depend on fragile source-order). */
    .src-doc-section.src-collapsed { flex: 0 0 auto !important; }
    .src-doc-section.src-collapsed .src-doc-stack { display: none; }

    /* Selected state on rows linked to the source doc */
    .notam-row[data-anchor-key] { cursor: pointer; }
    .met-row[data-met-anchor]   { cursor: pointer; }
    .notam-row.src-selected, .met-row.src-selected { background: rgba(74,124,240,0.10); }

    /* 44×44 touch target for close button */
    .panel-close {
      position: absolute; top: 8px; right: 8px;
      cursor: pointer; touch-action: manipulation;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: #778;
      border-radius: 8px;
    }
    .panel-close:hover { color: #aac; background: #1e2048; }
    .panel-close:active { background: #252860; }

    .panel-head {
      padding: 22px 20px 16px;
      border-bottom: 1px solid #1e2248;
    }
    .panel-icao {
      font-size: 1.55rem; font-weight: 700;
      color: #a0c8ff; letter-spacing: 0.04em;
    }
    .panel-name { font-size: 1rem; color: #889; margin-top: 4px; }
    .panel-ref  { font-size: 0.9rem; color: #667; margin-top: 8px; }

    .panel-section { padding: 16px 20px; border-bottom: 1px solid #1a1d3a; }
    .panel-label {
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.1em; color: #667;
      text-transform: uppercase; margin-bottom: 7px;
    }
    .panel-value {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 1rem; color: #c8d8f0;
      line-height: 1.55; white-space: pre-wrap; word-break: break-all;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.08em; padding: 3px 8px;
      border-radius: 4px; margin-bottom: 6px;
      text-transform: uppercase;
    }
    .badge-becmg  { background: #1a3a5a; color: #60b0ff; }
    .badge-tempo  { background: #3a2a10; color: #ffb040; }
    .badge-prob   { background: #2a1a3a; color: #c080ff; }
    .badge-window { font-size: 0.8rem; color: #778; margin-left: 6px; }

    /* NOTAM tier badges */
    .badge-t1 { background: #4a1010; color: #ff8080; }
    .badge-t2 { background: #3a2a00; color: #ffc060; }
    .badge-t3 { background: #1e1e2e; color: #667; }

    .notam-row {
      padding: 11px 0;
      border-bottom: 1px solid #191c38;
    }
    .notam-row:last-child { border-bottom: none; }
    .notam-header {
      display: flex; align-items: baseline; gap: 6px;
      flex-wrap: wrap; margin-bottom: 4px;
    }
    .notam-id { font-size: 0.8rem; color: #667; font-family: monospace; }
    .notam-window { font-size: 0.78rem; color: #667; }
    .notam-body {
      font-size: 0.95rem; color: #b8c8e0;
      line-height: 1.5;
    }

    .no-data { font-size: 0.9rem; color: #445; font-style: italic; }

    /* Runway chips in panel header */
    .rwy-chip {
      display: inline-flex; align-items: baseline; gap: 4px;
      background: #0e1e32; border: 1px solid #1e3a5a;
      border-radius: 5px; padding: 2px 7px;
      margin: 2px 4px 2px 0;
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 0.88rem; white-space: nowrap;
    }
    .rwy-name { color: #8ec8ff; }
    .rwy-len  { color: #4a6a8a; font-size: 0.8rem; }
    .rwy-chip[data-tier="1"] {
      border-color: #ff8080;
      box-shadow: 0 0 7px rgba(255,128,128,0.40);
      cursor: pointer;
    }
    .rwy-chip[data-tier="2"] {
      border-color: #ffc060;
      box-shadow: 0 0 7px rgba(255,192,96,0.30);
      cursor: pointer;
    }
    .notam-row { transition: background 1.5s ease-out; }
    .notam-flash { background: rgba(160,200,255,0.14); }
    .rwy-chip.rwy-chip-active {
      background: #1a2e4a; border-color: #60a8ff;
      box-shadow: 0 0 10px rgba(96,168,255,0.50);
    }
    .rwy-chip[data-tier].rwy-chip-dimmed { opacity: 0.30; }
    .notam-filter-clear {
      cursor: pointer; color: #60a8ff;
      font-weight: normal; text-transform: none;
      letter-spacing: 0; margin-left: 6px; font-size: 0.78rem;
    }

    /* L1/L2 leg chips in unified NOTAM block */
    .leg-chip {
      display: inline-block;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.05em; padding: 2px 5px;
      border-radius: 3px; margin-left: 3px;
      text-transform: uppercase; vertical-align: middle;
    }
    .leg-chip:not(.leg2) { background: #0e1e38; color: #5b9ef4; border: 1px solid #2a4a7a; }
    .leg-chip.leg2       { background: #2e1e08; color: #f4a15b; border: 1px solid #7a4a18; }
    /* 44px min-height touch target for "show N more" */
    .t3-expand {
      font-size: 0.88rem; color: #556; cursor: pointer; touch-action: manipulation;
      min-height: 44px; display: flex; align-items: center; justify-content: center;
      border-top: 1px solid #191c38;
    }
    .t3-expand:hover { color: #a0c8ff; }
    .t3-expand:active { background: #161830; }

    /* ── Header action buttons (airport shortcuts + FLIGHT) ── */
    #header-actions {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
    }
    .ap-btn {
      background: #1a1c3a; border: 1px solid #2a2d50;
      border-radius: 6px; padding: 6px 10px;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer; touch-action: manipulation;
      white-space: nowrap;
    }
    .ap-btn:hover  { background: #22254a; border-color: #4a5080; }
    .ap-btn:active { background: #2a2e58; }
    #docBtn {
      background: #1a1c3a; border: 1px solid #2a2d50;
      border-radius: 6px; padding: 6px 14px;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.1em; color: #a0c8ff;
      cursor: pointer; touch-action: manipulation;
      white-space: nowrap;
    }
    #docBtn:hover  { background: #22254a; border-color: #4a5080; }
    #docBtn:active { background: #2a2e58; }
    #docBtn.src-active { background: #1a2e4a; border-color: #4a7cf0; }
    #flightBtn {
      background: #1a1c3a; border: 1px solid #2a2d50;
      border-radius: 6px; padding: 6px 14px;
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.1em; color: #a0c8ff;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    #flightBtn:hover  { background: #22254a; border-color: #4a5080; }
    #flightBtn:active { background: #2a2e58; }
    #flightBadge {
      font-size: 0.65rem; font-weight: 700;
      padding: 2px 6px; border-radius: 3px;
      display: none;
    }
    #flightBadge.badge-t1 { display: inline-block; background: #4a1010; color: #ff8080; }
    #flightBadge.badge-t2 { display: inline-block; background: #3a2a00; color: #ffc060; }

    /* ── Flight-wide NOTAM filtered-out expand ── */
    .filtered-expand {
      font-size: 0.85rem; color: #445; cursor: pointer; touch-action: manipulation;
      min-height: 44px; display: flex; align-items: center; justify-content: center;
      border-top: 1px dotted #1a1d3a; margin-top: 6px;
    }
    .filtered-expand:hover { color: #778; }

    /* ── Status chip ── */
    #status {
      position: fixed; bottom: 16px; right: 16px; z-index: 1000;
      background: rgba(20,20,40,0.90); padding: 7px 14px;
      border-radius: 6px; font-size: 0.78rem; color: #667;
    }
    body.panel-open #status { right: calc(var(--panel-w) + 16px); }

    /* ── Dropped-airport warning banner ── */
    #warnBanner {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
      background: #3a2a00; color: #ffc060;
      font-size: 0.82rem; padding: 8px 16px;
      align-items: center; gap: 10px;
      border-bottom: 1px solid #5a4200;
    }
    #warnBanner.show { display: flex; }
    #warnBanner .warn-text { flex: 1; }
    #warnBanner .warn-close {
      cursor: pointer; touch-action: manipulation;
      padding: 4px 10px; color: #ffc060; font-weight: 700;
    }

    /* ── Leaflet popup (used for DEP/DEST) ── */
    .leaflet-popup-content-wrapper {
      background: #1e2340; border: 1px solid #3a4060;
      border-radius: 6px; color: #dde;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .leaflet-popup-tip { background: #1e2340; }
    .leaflet-popup-content { margin: 12px 16px; }
    .pu-icao { font-size: 1.05rem; font-weight: 700; color: #a0c8ff; }
    .pu-name { font-size: 0.82rem; color: #99a; margin-top: 3px; }

    /* ── Multi-leg section divider ── */
    .leg-divider {
      padding: 8px 18px 4px;
      background: #0e1020;
      border-bottom: 1px solid #1a1d3a;
    }
    .leg-divider-label {
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #5b9ef4;
    }
    .leg-divider-label.leg2 { color: #f4a15b; }

    /* ── Weather severity tag (panel) ── */
    .wx-tag {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* ── Weather/role legend (map corner) ── */
    #wxLegend {
      position: fixed;
      left: 12px;
      bottom: 18px;
      z-index: 500;
      background: rgba(18,19,42,0.92);
      border: 1px solid #3a4060;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.72rem;
      color: #ccd;
      line-height: 1.7;
      pointer-events: none;
    }
    #wxLegend .row { display: flex; align-items: center; gap: 6px; }
    #wxLegend .dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
    }
    #wxLegend .ring {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid; background: transparent; flex-shrink: 0;
    }
    #wxLegend .sep { height: 1px; background: #3a4060; margin: 5px 0; }

    /* ── Leaflet tooltip (hover label) ── */
    .leaflet-tooltip {
      background: rgba(18,20,44,0.92);
      border: 1px solid #3a4060;
      color: #a0c8ff;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 5px;
      box-shadow: none;
      white-space: nowrap;
    }
    .leaflet-tooltip::before { display: none; }
  </style>
</head>
<body>

<div id="warnBanner">
  <span class="warn-text" id="warnBannerText"></span>
  <span class="warn-close" onclick="document.getElementById('warnBanner').classList.remove('show')">✕</span>
</div>

<div id="header">
  <h1 id="hdr-title">Preflight Briefing</h1>
  <span id="hdr-sub"></span>
  <div id="header-actions">
    <button id="docBtn" style="display:none" onclick="toggleSrcPane()">DOC</button>
    <button id="flightBtn" onclick="openFlightPanel()">FLIGHT <span id="flightBadge"></span></button>
  </div>
</div>

<div id="srcPane">
  <div id="srcPane-header">
    <span>Source Documents</span>
    <span id="srcPane-close" onclick="closeSrcPane()">✕</span>
  </div>
  <div id="srcSections">
    <div id="srcSection-met" class="src-doc-section src-doc-hidden" data-doc="met">
      <div class="src-doc-header" onclick="toggleSrcSection('met')">
        <span class="src-doc-title"><span class="src-doc-chevron">▾</span> MET — Original</span>
        <span id="srcMetLegend" class="src-doc-legend"></span>
      </div>
      <div class="src-doc-stack" id="srcStack-met"></div>
    </div>
    <div id="srcSection-notam" class="src-doc-section src-doc-hidden" data-doc="notam">
      <div class="src-doc-header" onclick="toggleSrcSection('notam')">
        <span class="src-doc-title"><span class="src-doc-chevron">▾</span> NOTAM — Original</span>
      </div>
      <div class="src-doc-stack" id="srcStack-notam"></div>
    </div>
  </div>
</div>

<div id="map"></div>
<div id="wxLegend">
  <div class="row"><span class="dot" style="background:#4cff91"></span> Good</div>
  <div class="row"><span class="dot" style="background:#ffd23f"></span> Caution</div>
  <div class="row"><span class="dot" style="background:#ff8c1a"></span> Probable severe</div>
  <div class="row"><span class="dot" style="background:#ff5050"></span> Significant</div>
  <div class="sep"></div>
  <div class="row"><span class="ring" style="border-color:#fff"></span> Dep/Dest</div>
  <div class="row"><span class="ring" style="border-color:#d060a0"></span> Alternate</div>
</div>

<!-- Weather side panel -->
<div id="panel">
  <div class="panel-close" onclick="closePanel()">✕</div>
  <div id="panel-content"></div>
  <div id="panel-nav"></div>
</div>

<div id="status">Loading…</div>

<script>
// ── Group URL param (which map tab: ?g=1 or ?g=2) ─────────────────────────
const GROUP = new URLSearchParams(location.search).get("g") || "1";
const DATA  = f => `/data/${GROUP}/${f}`;

const ROUTE_COLORS = ["#5b9ef4", "#f4a15b"];  // leg 1 = blue, leg 2 = orange

let _activeRwyFilter = null;
let _navAirports = [];
let _navFirs     = [];
let _navIndex    = -1;

// ── Source Pane (original MET + NOTAM PDFs, click-to-highlight) ─────────────
//   docs.met / docs.notam each hold their own anchors/pages/collapse state so
//   the two Document Sections act independently (see CONTEXT.md — "Document
//   Section"). highlightEls/selectedRowEl are tracked per doc so clearing one
//   document's highlight never touches the other's.
let _srcPane = {
  open: false,
  docs: {
    met:   { anchors: null, pageSizes: [], pages: 0, loaded: false, collapsed: false,
             activeKey: null, selectedRowEl: null, highlightEls: [] },
    notam: { anchors: null, pageSizes: [], pages: 0, loaded: false, collapsed: false,
             activeKey: null, selectedRowEl: null, highlightEls: [] },
  },
};

const map = L.map("map", { center: [30, 60], zoom: 3 });

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18,
}).addTo(map);

// ── Panel ──────────────────────────────────────────────────────────────────
function _navList() {
  return [
    ..._navAirports.map(a => ({ data: a, type: 'airport' })),
    ..._navFirs.map(f    => ({ data: f, type: 'fir' })),
  ];
}

function _updateNavBar() {
  const nav = document.getElementById("panel-nav");
  if (!nav) return;
  const list = _navList();
  if (_navIndex < 0 || !list.length) { nav.innerHTML = ''; return; }

  const prev = _navIndex > 0               ? list[_navIndex - 1] : null;
  const next = _navIndex < list.length - 1 ? list[_navIndex + 1] : null;
  const label = e => e.type === 'fir' ? e.data.fir : e.data.icao;

  nav.innerHTML =
    (prev ? `<button class="nav-btn nav-prev" onclick="navigateTo(${_navIndex-1})">← ${label(prev)}</button>` : '<span></span>') +
    (next ? `<button class="nav-btn nav-next" onclick="navigateTo(${_navIndex+1})">${label(next)} →</button>` : '<span></span>');
}

function focusAirport(lat, lon) {
  map.flyTo([lat, lon], Math.max(map.getZoom(), 7),
            { duration: 0.75, easeLinearity: 0.4 });
}

function navigateTo(idx) {
  const list = _navList();
  if (idx < 0 || idx >= list.length) return;
  const { data, type } = list[idx];
  openPanel(data, type);
  focusAirport(data.lat, data.lon);
}

function openPanel(data, type = 'airport') {
  clearNotamFilter();
  const c = document.getElementById("panel-content");
  c.innerHTML = type === "fir" ? buildFirPanel(data) : buildPanel(data);
  document.body.classList.add("panel-open");
  map.invalidateSize();
  const list = _navList();
  const key  = type === 'fir' ? data.fir : data.icao;
  _navIndex  = list.findIndex(e => e.type === type && (e.type === 'fir' ? e.data.fir : e.data.icao) === key);
  _updateNavBar();
  _syncSourcePane(data, type);
}

function expandT3(uid, btn) {
  document.getElementById(uid + "-more").style.display = "";
  btn.style.display = "none";
}
function closePanel() {
  _navIndex = -1;
  document.body.classList.remove("panel-open");
  map.invalidateSize();
}

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// ── Source Pane: lazy page stacks, open/close, collapse/accordion,
//    click-to-highlight, ETA-window fills ────────────────────────────────────

function _isNarrow() {
  return window.matchMedia('(max-width: 900px)').matches;
}

function _srcPagePrefix(doc) {
  return doc === 'met' ? 'met_page' : 'notam_page';
}

function _buildSrcDocDom(doc) {
  const d = _srcPane.docs[doc];
  if (d.loaded || !d.pages) return;
  let html = '';
  for (let i = 1; i <= d.pages; i++) {
    const [pw, ph] = d.pageSizes[i - 1] || [595, 842];
    const page = String(i).padStart(3, '0');
    html += `<div class="src-page" id="src-page-${doc}-${i}" style="aspect-ratio:${pw}/${ph}">
      <img src="${DATA(_srcPagePrefix(doc) + '_' + page + '.png')}" loading="lazy" alt="${doc.toUpperCase()} page ${i}">
    </div>`;
  }
  document.getElementById(`srcStack-${doc}`).innerHTML = html;
  d.loaded = true;
}

// Collapsing a section shrinks it to its header bar; on narrow viewports
// (accordion), expanding one section forces the other to collapse.
function _setSectionCollapsed(doc, collapsed) {
  _srcPane.docs[doc].collapsed = collapsed;
  document.getElementById(`srcSection-${doc}`).classList.toggle('src-collapsed', collapsed);

  if (!collapsed && _isNarrow()) {
    const other = doc === 'met' ? 'notam' : 'met';
    _srcPane.docs[other].collapsed = true;
    document.getElementById(`srcSection-${other}`).classList.add('src-collapsed');
  }
}

function toggleSrcSection(doc) {
  _setSectionCollapsed(doc, !_srcPane.docs[doc].collapsed);
}

function _expandSection(doc) {
  _setSectionCollapsed(doc, false);
}

function openSrcPane() {
  _buildSrcDocDom('met');
  _buildSrcDocDom('notam');
  _srcPane.open = true;
  document.body.classList.add('src-open');
  document.getElementById('docBtn')?.classList.add('src-active');
  map.invalidateSize();
}

function closeSrcPane() {
  _srcPane.open = false;
  document.body.classList.remove('src-open');
  document.getElementById('docBtn')?.classList.remove('src-active');
  _clearDocHighlight('met');
  _clearDocHighlight('notam');
  map.invalidateSize();
}

function toggleSrcPane() {
  if (_srcPane.open) closeSrcPane(); else openSrcPane();
}

function _clearDocHighlight(doc) {
  const d = _srcPane.docs[doc];
  d.highlightEls.forEach(el => el.remove());
  d.highlightEls = [];
  if (d.selectedRowEl) {
    d.selectedRowEl.classList.remove('src-selected');
    d.selectedRowEl = null;
  }
}

function _positionRect(el, r) {
  el.style.left   = (r.x0 * 100) + '%';
  el.style.top    = (r.y0 * 100) + '%';
  el.style.width  = ((r.x1 - r.x0) * 100) + '%';
  el.style.height = ((r.y1 - r.y0) * 100) + '%';
}

function _rgba(hex, alpha) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${alpha})`;
}

// buildPanel synthesizes a single-leg array for legacy flat-schema airports;
// shared here so ETA-window fills use the identical leg list the panel showed.
function _legsFor(ap) {
  return ap.legs || [{
    leg: 1,
    ref_time:          ap.ref_time,
    taf_base:          ap.taf_base,
    taf_base_src:      ap.taf_base_src,
    becmg_in_progress: ap.becmg_in_progress,
    active_overlays:   ap.active_overlays || [],
    notams:            ap.notams || [],
    notam_covered:     ap.notam_covered,
    wx_tier:           ap.wx_tier,
  }];
}

function _updateMetLegend(multiLeg) {
  const el = document.getElementById('srcMetLegend');
  if (!el) return;
  if (!multiLeg) { el.classList.remove('show'); el.innerHTML = ''; return; }
  el.innerHTML =
    `<span><span class="swatch" style="background:${ROUTE_COLORS[0]}"></span>L1</span>` +
    `<span><span class="swatch" style="background:${ROUTE_COLORS[1]}"></span>L2</span>` +
    `<span>solid = at ETA, thin = ETA±1h</span>` +
    `<span>double ring = both legs</span>`;
  el.classList.add('show');
}

// Two word rects are on the same physical PDF line iff they share a page and
// vertical band — the same test _words_to_group_rects uses server-side to
// decide what counts as "one line" for merging.
function _sameLine(a, b) {
  return a.page === b.page && a.y0 === b.y0 && a.y1 === b.y1;
}

function _unionRect(a, b) {
  return { page: a.page, y0: a.y0, y1: a.y1, x0: Math.min(a.x0, b.x0), x1: Math.max(a.x1, b.x1) };
}

// colors is a single hex string, or [color1, color2] when this rect is shared
// by more than one leg (see _drawMergedFills) — a second color draws as an
// outer ring via box-shadow so both legs stay visible on one fill instead of
// one leg's box fully occluding the other's.
function _appendMetFill(colors, rect, extraCls) {
  const pageEl = document.getElementById(`src-page-met-${rect.page}`);
  if (!pageEl) return;
  const list = Array.isArray(colors) ? colors : [colors];
  const fill = document.createElement('div');
  fill.className = extraCls ? `src-fill ${extraCls}` : 'src-fill';
  _positionRect(fill, rect);
  fill.style.background = _rgba(list[0], 0.32);
  fill.style.border = `${extraCls === 'src-fill-base' ? 2 : 1}px solid ${list[0]}`;
  if (list.length > 1) fill.style.boxShadow = `0 0 0 2px ${list[1]}`;
  pageEl.appendChild(fill);
  _srcPane.docs.met.highlightEls.push(fill);
}

// Baseline ("conditions at ETA") token fills: taf_base_src is a token list
// {t, s} in taf_raw-offset space; entry.words is [[start, end, rect], ...] in
// the same offset space (see met_engine.py taf_base_src, met_anchors.py
// "words"). A token whose exact [s, s+t.length) span isn't in entry.words is
// a graceful miss — draw nothing, never approximate (docs/adr/0001, 0002).
//
// Returns fill entries {rect, leg} rather than drawing directly —
// _drawMetEtaFills merges these across legs before drawing (see
// _drawMergedFills) so two legs resolving to the identical rect (e.g. a quick
// turnaround where nothing changed between both legs' ETAs) draw one shared
// fill instead of the later leg's box fully hiding the earlier leg's.
function _resolveBaselineFillEntries(taps, words, legNum) {
  if (!taps.length || !words.length) return [];
  const byStart = new Map(words.map(w => [w[0], w]));

  const resolved = [];
  taps.forEach(tok => {
    const end = tok.s + tok.t.length;
    const w = byStart.get(tok.s);
    if (w && w[1] === end) resolved.push({ s: tok.s, e: end, rect: w[2] });
  });

  // Merge tokens that are contiguous in source AND share a PDF line into one
  // rect (text-selection style) — e.g. "9999 FEW020" reads as one clean box.
  const merged = [];
  resolved.forEach(r => {
    const prev = merged[merged.length - 1];
    if (prev && prev.e + 1 === r.s && _sameLine(prev.rect, r.rect)) {
      prev.rect = _unionRect(prev.rect, r.rect);
      prev.e = r.e;
    } else {
      merged.push({ s: r.s, e: r.e, rect: r.rect });
    }
  });

  return merged.map(m => ({ rect: m.rect, leg: legNum }));
}

// Groups per-leg fill entries {rect, leg} by exact rect coordinates (page +
// all four bounds) so legs whose ETA windows resolve to the identical PDF
// rect draw ONE fill with a two-tone ring instead of stacking separate
// same-position divs where the later leg always wins the draw order. Only
// exact coordinate matches merge — never a nearby/approximate rect — since a
// shared src_start or shared baseline token always resolves to the same
// anchors-derived rect object by construction (met_anchors.json geometry is
// keyed per-airport, not per-leg). Scoped to one fill category per call —
// window fills and baseline fills are never merged with each other, since
// their border styles intentionally mean different things (ETA±1h vs at-ETA).
function _drawMergedFills(entries, extraCls) {
  const seen = new Map();
  const order = [];
  entries.forEach(({ rect, leg }) => {
    const key = `${rect.page}|${rect.x0}|${rect.y0}|${rect.x1}|${rect.y1}`;
    let g = seen.get(key);
    if (!g) { g = { rect, legs: [] }; seen.set(key, g); order.push(g); }
    if (!g.legs.includes(leg)) g.legs.push(leg);
  });

  order.forEach(g => {
    const legsSorted = g.legs.slice().sort((a, b) => a - b);
    const colors = legsSorted.map(n => ROUTE_COLORS[(n - 1) % ROUTE_COLORS.length]);
    _appendMetFill(colors, g.rect, extraCls);
  });
}

// ETA-window highlights: for each leg, the raw TAF groups behind the panel's
// BECMG-in-progress / active-overlay sections get a translucent leg-colored
// fill inside the already-drawn block border, plus token-level fills for the
// conditions actually holding at ETA (taf_base_src). A lookup miss (no groups
// for this airport, or an offset the anchor pass didn't resolve) draws
// nothing — never approximate (see docs/adr/0001, docs/adr/0002).
function _drawMetEtaFills(icao, entry) {
  const groups = entry.groups || {};
  const words = entry.words || [];
  const ap = (_navAirports || []).find(a => a.icao === icao);
  if (!ap) { _updateMetLegend(false); return; }

  const legs = _legsFor(ap);
  const multiLeg = legs.length > 1;

  // Collect every leg's fill entries per category first, then merge — see
  // _drawMergedFills for why this can't draw per-leg inline any more.
  const windowEntries = [];
  const baselineEntries = [];
  legs.forEach(leg => {
    const spans = [];
    if (leg.becmg_in_progress && leg.becmg_in_progress.src_start != null) {
      spans.push(leg.becmg_in_progress.src_start);
    }
    (leg.active_overlays || []).forEach(ov => {
      if (ov.src_start != null) spans.push(ov.src_start);
    });

    spans.forEach(srcStart => {
      const rects = groups[String(srcStart)];
      if (!rects) return;
      rects.forEach(r => windowEntries.push({ rect: r, leg: leg.leg }));
    });

    baselineEntries.push(..._resolveBaselineFillEntries(leg.taf_base_src || [], words, leg.leg));
  });

  _drawMergedFills(windowEntries, null);
  _drawMergedFills(baselineEntries, 'src-fill-base');

  _updateMetLegend(multiLeg);
}

// Content half of a source-anchor jump: clear this doc's previous highlight,
// draw the new block border (+ ETA-window fills for MET), mark the row
// selected, and scroll it into view. No layout side effects (no open/expand)
// — callers decide whether this jump should touch layout (see
// showSourceAnchor vs. _syncSourcePane / CONTEXT.md "Selection Sync").
function _drawDocAnchor(doc, key, rowEl) {
  const anchors = _srcPane.docs[doc].anchors;
  const entry = anchors && anchors[key];
  if (!entry) return;

  const blockRects = doc === 'met' ? (entry.block || []) : entry;
  if (!blockRects.length) return;

  _clearDocHighlight(doc);
  if (rowEl) {
    rowEl.classList.add('src-selected');
    _srcPane.docs[doc].selectedRowEl = rowEl;
  }
  _srcPane.docs[doc].activeKey = key;

  let firstEl = null;
  blockRects.forEach(r => {
    const pageEl = document.getElementById(`src-page-${doc}-${r.page}`);
    if (!pageEl) return;
    const hl = document.createElement('div');
    hl.className = 'src-highlight';
    _positionRect(hl, r);
    pageEl.appendChild(hl);
    _srcPane.docs[doc].highlightEls.push(hl);
    if (!firstEl) firstEl = hl;
  });

  if (doc === 'met') _drawMetEtaFills(key, entry);

  if (firstEl) firstEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// Tapping any row that carries a data-anchor-key (NOTAM) or data-met-anchor
// (MET) opens the Source Pane (auto-opening it the first time), auto-expands
// (or accordion-flips to) that document's section, and draws a highlight over
// the anchored block in the original PDF page image. MET taps additionally
// layer ETA-window fills inside the block. At most one highlight per document
// — a MET highlight and a NOTAM highlight may be visible at the same time.
function showSourceAnchor(doc, key, rowEl) {
  const anchors = _srcPane.docs[doc].anchors;
  if (!anchors || !anchors[key]) return;

  openSrcPane();
  _expandSection(doc);
  _drawDocAnchor(doc, key, rowEl);
}

document.addEventListener('click', e => {
  const notamRow = e.target.closest('.notam-row[data-anchor-key]');
  if (notamRow) { showSourceAnchor('notam', notamRow.dataset.anchorKey, notamRow); return; }

  const metRow = e.target.closest('.met-row[data-met-anchor]');
  if (metRow) { showSourceAnchor('met', metRow.dataset.metAnchor, metRow); return; }
});

// Selection Sync (docs/adr/0002, CONTEXT.md "Selection Sync"): while the
// Source Pane is open, selecting anything on the map or in the header drives
// both documents without changing layout — no open, no expand, no accordion
// flip (Decision 4). The first anchored NOTAM row in displayed (DOM) order IS
// the panel's first-by-severity row (T1 else T2 else T3), so no re-sorting is
// needed here; this also makes FIR and FLIGHT panels work with zero extra
// logic (Decision 2/3). Only airport selections touch the MET document.
function _syncSourcePane(data, type) {
  if (!_srcPane.open) return;

  const panel = document.getElementById('panel-content');
  if (!panel) return;

  if (type === 'airport') {
    const metAnchors = _srcPane.docs.met.anchors;
    if (metAnchors && metAnchors[data.icao]) {
      _drawDocAnchor('met', data.icao, panel.querySelector('.met-row[data-met-anchor]'));
    }
  }

  const row = panel.querySelector('.notam-row[data-anchor-key]');
  if (row) _drawDocAnchor('notam', row.dataset.anchorKey, row);
}

// ── Runway chips (built from union of notams across all legs) ───────────────
function buildChips(runway_info, allNotams) {
  const rwyRe = /\bRWY\s+(\d{2}[LCR]?(?:\/\d{2}[LCR]?)?)/gi;
  const pairs = (runway_info || '').match(/\d{2}[LCR]?\/\d{2}[LCR]?\s+\d+/g) || [];
  if (!pairs.length) return esc(runway_info);

  return pairs.map(p => {
    const [rwy, len] = p.split(/\s+/);
    const ends = rwy.split('/');
    const chipExact   = new Set(ends);
    const chipNumeric = new Set(ends.map(e => e.replace(/[LCR]$/, '')));

    let bestTier = null;
    const matchedIds = [];

    for (const n of (allNotams || [])) {
      const text = (n.summary || '') + ' ' + (n.body || '');
      let m; rwyRe.lastIndex = 0;
      let hit = false;
      while ((m = rwyRe.exec(text)) !== null) {
        for (const tok of m[1].toUpperCase().split('/')) {
          if (/[LCR]$/.test(tok)) {
            if (chipExact.has(tok))   { hit = true; break; }
          } else {
            if (chipNumeric.has(tok)) { hit = true; break; }
          }
        }
        if (hit) break;
      }
      if (hit) {
        matchedIds.push(n.id);
        if (n.tier <= 2 && (bestTier === null || n.tier < bestTier)) bestTier = n.tier;
      }
    }

    const tierAttr = bestTier ? `data-tier="${bestTier}"` : '';
    // NOTAM IDs come from third-party PDFs — pass them via data attributes,
    // never interpolated into inline JS
    return `<span class="rwy-chip" ${tierAttr} data-rwy="${rwy}" data-ids="${esc(matchedIds.join('|'))}"><span class="rwy-name">${rwy}</span><span class="rwy-len">${len}m</span></span>`;
  }).join('');
}

document.addEventListener('click', e => {
  const chip = e.target.closest('.rwy-chip[data-rwy]');
  if (!chip) return;
  filterNotams(chip.dataset.ids ? chip.dataset.ids.split('|') : [], chip.dataset.rwy);
});

// ── NOTAM filter (matches by data-notam-id attr so it spans leg sections) ──
function filterNotams(ids, rwy) {
  if (_activeRwyFilter && _activeRwyFilter.rwy === rwy) {
    clearNotamFilter();
    return;
  }
  _activeRwyFilter = { rwy, ids };
  const idSet = new Set(ids.map(id => id.replace(/[^a-zA-Z0-9]/g, '_')));

  document.querySelectorAll('.notam-row').forEach(row => {
    row.style.display = idSet.has(row.dataset.notamId) ? '' : 'none';
  });

  const label = document.getElementById('notam-label');
  if (label) {
    label.innerHTML = `NOTAMs for RWY ${rwy}<span class="notam-filter-clear" onclick="clearNotamFilter()">× show all</span>`;
  }

  document.querySelectorAll('.rwy-chip').forEach(chip => {
    const chipRwy = chip.querySelector('.rwy-name')?.textContent;
    chip.classList.toggle('rwy-chip-active', chipRwy === rwy);
    chip.classList.toggle('rwy-chip-dimmed', !!chip.dataset.tier && chipRwy !== rwy);
  });

  const first = [...document.querySelectorAll('.notam-row')].find(r => idSet.has(r.dataset.notamId));
  if (first) document.getElementById('panel-content').scrollTop = first.offsetTop - 80;
}

function clearNotamFilter() {
  _activeRwyFilter = null;
  document.querySelectorAll('.notam-row').forEach(row => { row.style.display = ''; });
  const label = document.getElementById('notam-label');
  if (label) label.innerHTML = label.dataset.original || 'NOTAMs';
  document.querySelectorAll('.rwy-chip').forEach(chip => {
    chip.classList.remove('rwy-chip-active', 'rwy-chip-dimmed');
  });
}

let _generalNotams = [];

function badgeClass(type) {
  if (!type) return "badge-becmg";
  const t = type.toUpperCase();
  if (t.includes("TEMPO")) return "badge-tempo";
  if (t.includes("PROB"))  return "badge-prob";
  return "badge-becmg";
}

// ── notamRow: renders a NOTAM row. legInfo is a number for single-leg rows
//   (DOM id: notam-l<N>-<safeId>) or an array/null for unified multi-leg rows
//   (DOM id: notam-u-<safeId>, with optional per-leg chips).
//   anchorKey (optional) is "<owner>|<notam id>" — if it exists in the loaded
//   Source Pane anchors, the row becomes clickable and gets a passive blue dot.
function notamRow(n, legInfo, anchorKey) {
  const unified  = Array.isArray(legInfo);
  const tierClass = n.tier === 1 ? "badge-t1" : n.tier === 2 ? "badge-t2" : "badge-t3";
  const tierLabel = n.tier === 1 ? "T1" : n.tier === 2 ? "T2" : "T3";
  const win    = compactWindow(n.window);
  const safeId = n.id.replace(/[^a-zA-Z0-9]/g, '_');
  const domId  = unified ? `notam-u-${safeId}` : `notam-l${legInfo}-${safeId}`;
  const chips  = unified && legInfo
    ? legInfo.map(num => `<span class="leg-chip${num === 2 ? ' leg2' : ''}">L${num}</span>`).join('')
    : '';
  const shown  = n.summary || n.body;
  const hasAnchor = !!(anchorKey && _srcPane.docs.notam.anchors && _srcPane.docs.notam.anchors[anchorKey]);
  const anchorAttr = hasAnchor ? ` data-anchor-key="${esc(anchorKey)}"` : '';
  let row = `<div class="notam-row" id="${domId}" data-notam-id="${safeId}"${anchorAttr}>
    <div class="notam-header">
      <span class="badge ${tierClass}">${tierLabel}</span>${chips}
      <span class="notam-id">${esc(n.id)}</span>`;
  if (win) row += `<span class="notam-window">${esc(win)}</span>`;
  row += `</div><div class="notam-body">${esc(shown)}</div></div>`;
  return row;
}

function compactWindow(w) {
  if (!w) return "";
  const m = w.match(/(\d+)\s+(\w+)\s+\d+\s+(\d+):(\d+)Z\s+–\s+(\d+)\s+(\w+)\s+\d+\s+(\d+):(\d+)Z/);
  if (!m) return w;
  const [, d1, mo1, h1, mi1, d2, mo2, h2, mi2] = m;
  const same = mo1 === mo2;
  const from = `${d1}${mo1.slice(0,3)} ${h1}${mi1}`;
  const to   = same && d1 === d2 ? `${h2}${mi2}Z` : `${d2}${mo2.slice(0,3)} ${h2}${mi2}Z`;
  return `${from}–${to}`;
}

// ── buildPanel: MET for all legs first, then unified NOTAM block ─────────────
function buildPanel(ap) {
  const legs = _legsFor(ap);

  const allNotams = legs.flatMap(l => l.notams || []);
  const multiLeg  = legs.length > 1;
  const distLabel = ap.dist_nm != null
    ? (ap.dist_nm < 120 ? `~${ap.dist_nm} nm from track` : `~${ap.dist_nm} nm (regional)`)
    : "";

  let html = `<div class="panel-head">
    <div class="panel-icao">${esc(ap.icao)} / ${esc(ap.iata)}</div>
    <div class="panel-name" style="line-height:2">${ap.runway_info ? buildChips(ap.runway_info, allNotams) : esc(ap.name)}</div>
    ${distLabel ? `<div class="panel-ref">${distLabel}</div>` : ""}
  </div>`;

  // ── MET block: all legs in order ─────────────────────────────────────────
  // Every MET row (conditions / BECMG-in-progress / overlay) taps to the same
  // whole-block Source Highlight — see CONTEXT.md "MET Block". One anchor
  // attribute value per airport, applied uniformly across all three row kinds.
  const hasMetAnchor = !!(_srcPane.docs.met.anchors && _srcPane.docs.met.anchors[ap.icao]);
  const metAttr = hasMetAnchor ? ` data-met-anchor="${esc(ap.icao)}"` : '';

  legs.forEach(leg => {
    if (multiLeg) {
      const cls = leg.leg === 2 ? "leg-divider-label leg2" : "leg-divider-label";
      html += `<div class="leg-divider"><span class="${cls}">LEG ${leg.leg} · ${esc(leg.ref_time)}</span> ${wxTag(leg.wx_tier)}</div>`;
    }
    html += `<div class="panel-section met-row"${metAttr}>
      <div class="panel-label">Conditions at ${esc(leg.ref_time)} ${multiLeg ? "" : wxTag(leg.wx_tier)}</div>`;
    html += leg.taf_base
      ? `<div class="panel-value">${esc(leg.taf_base)}</div>`
      : `<div class="no-data">No TAF</div>`;
    html += `</div>`;

    if (leg.becmg_in_progress) {
      const b = leg.becmg_in_progress;
      html += `<div class="panel-section met-row"${metAttr}>
        <div class="panel-label">BECMG in progress</div>
        <span class="badge badge-becmg">BECMG</span>
        <span class="badge-window">${esc(b.window)}</span>
        <div class="panel-value" style="margin-top:5px">${esc(b.text)}</div>
      </div>`;
    }
    (leg.active_overlays || []).forEach(ov => {
      html += `<div class="panel-section met-row"${metAttr}>
        <span class="badge ${badgeClass(ov.type)}">${esc(ov.type)}</span>
        <span class="badge-window">${esc(ov.window)}</span>
        <div class="panel-value" style="margin-top:5px">${esc(ov.text)}</div>
      </div>`;
    });
  });

  // ── Unified NOTAM block ───────────────────────────────────────────────────
  const notamLabelText = multiLeg
    ? `NOTAMs · ${legs.map(l => `L${l.leg} ${l.ref_time}`).join(' · ')}`
    : `NOTAMs active at ${legs[0].ref_time}`;

  html += `<div class="panel-section">
    <div class="panel-label" id="notam-label" data-original="${esc(notamLabelText)}">${esc(notamLabelText)}</div>`;

  const allUncovered = legs.every(l => l.notam_covered === false);
  if (allUncovered) {
    html += `<div class="no-data">Airport not in NOTAM brief</div>`;
  } else if (!multiLeg) {
    const notams = legs[0].notams || [];
    if (notams.length === 0) {
      html += `<div class="no-data">No active NOTAMs at ref time</div>`;
    } else {
      notams.forEach(n => { html += notamRow(n, legs[0].leg, `${ap.icao}|${n.id}`); });
    }
  } else {
    // Deduplicate by NOTAM ID across legs, sort by tier
    const notamMap = new Map();
    legs.forEach(leg => {
      (leg.notams || []).forEach(n => {
        if (!notamMap.has(n.id)) notamMap.set(n.id, { notam: n, legNums: [] });
        notamMap.get(n.id).legNums.push(leg.leg);
      });
    });
    const unified = [...notamMap.values()].sort((a, b) => a.notam.tier - b.notam.tier);

    if (unified.length === 0) {
      html += `<div class="no-data">No active NOTAMs at either ref time</div>`;
    } else {
      unified.forEach(({ notam: n, legNums }) => {
        html += notamRow(n, legNums.length < legs.length ? legNums : null, `${ap.icao}|${n.id}`);
      });
    }
    // Per-leg notes for empty / not-in-brief
    legs.forEach(leg => {
      if (leg.notam_covered === false) {
        html += `<div class="no-data" style="margin-top:6px">
          <span class="leg-chip${leg.leg === 2 ? ' leg2' : ''}">L${leg.leg}</span> Airport not in NOTAM brief</div>`;
      } else if ((leg.notams || []).length === 0) {
        html += `<div class="no-data" style="margin-top:6px">
          <span class="leg-chip${leg.leg === 2 ? ' leg2' : ''}">L${leg.leg}</span> No active NOTAMs at ${esc(leg.ref_time)}</div>`;
      }
    });
  }
  html += `</div>`;
  return html;
}

// ── buildFirPanel: unified NOTAM block for multi-leg; original for single ────
function buildFirPanel(f) {
  const legs = f.legs || [{ leg: 1, ref_time: f.ref_time, notams: f.notams || [] }];
  const multiLeg = legs.length > 1;

  let html = `<div class="panel-head">
    <div class="panel-icao">${esc(f.fir)}</div>
    <div class="panel-name">${esc(f.name)}</div>
    ${!multiLeg ? `<div class="panel-ref">Ref: ${esc(legs[0].ref_time)}</div>` : ""}
  </div>`;

  if (!multiLeg) {
    return html + buildFirNotamSection(legs[0], f.fir);
  }

  // Multi-leg: deduplicate by NOTAM ID, sort by tier
  const notamMap = new Map();
  legs.forEach(leg => {
    (leg.notams || []).forEach(n => {
      if (!notamMap.has(n.id)) notamMap.set(n.id, { notam: n, legNums: [] });
      notamMap.get(n.id).legNums.push(leg.leg);
    });
  });
  const unified = [...notamMap.values()].sort((a, b) => a.notam.tier - b.notam.tier);
  const notamLabel = `FIR NOTAMs · ${legs.map(l => `L${l.leg} ${l.ref_time}`).join(' · ')}`;

  html += `<div class="panel-section"><div class="panel-label">${notamLabel}</div>`;

  if (unified.length === 0) {
    html += `<div class="no-data">No active FIR NOTAMs</div>`;
  } else {
    const t1t2 = unified.filter(u => u.notam.tier < 3);
    const t3   = unified.filter(u => u.notam.tier === 3);

    t1t2.forEach(({ notam: n, legNums }) => {
      html += notamRow(n, legNums.length < legs.length ? legNums : null, `${f.fir}|${n.id}`);
    });

    t3.forEach(({ notam: n, legNums }) => {
      html += notamRow(n, legNums.length < legs.length ? legNums : null, `${f.fir}|${n.id}`);
    });

    legs.forEach(leg => {
      if ((leg.notams || []).length === 0) {
        html += `<div class="no-data" style="margin-top:6px">
          <span class="leg-chip${leg.leg === 2 ? ' leg2' : ''}">L${leg.leg}</span> No active FIR NOTAMs at ${esc(leg.ref_time)}</div>`;
      }
    });
  }
  html += `</div>`;
  return html;
}

function buildFirNotamSection(leg, firCode) {
  const notams = leg.notams || [];
  let html = `<div class="panel-section">
    <div class="panel-label">FIR NOTAMs active at ${esc(leg.ref_time)}</div>`;

  if (notams.length === 0) {
    return html + `<div class="no-data">No active FIR NOTAMs</div></div>`;
  }

  const t1t2 = notams.filter(n => n.tier < 3);
  const t3   = notams.filter(n => n.tier === 3);

  t1t2.forEach(n => { html += notamRow(n, leg.leg, `${firCode}|${n.id}`); });

  t3.forEach(n => { html += notamRow(n, leg.leg, `${firCode}|${n.id}`); });

  return html + `</div>`;
}

// ── Flight-wide NOTAM panel ────────────────────────────────────────────────
function openFlightPanel() {
  document.getElementById('panel-content').innerHTML = buildFlightPanel(_generalNotams);
  document.body.classList.add('panel-open');
  _navIndex = -1;
  _updateNavBar();
  _syncSourcePane(null, 'flight');
}

function buildFlightPanel(sections) {
  let html = `<div class="panel-head">
    <div class="panel-icao">FLIGHT BRIEFING</div>
    <div class="panel-name" style="color:#667;font-size:0.82rem">General · Flight Leg · Aeroplane</div>
  </div>`;

  sections.forEach(sec => {
    html += `<div class="panel-section">
      <div class="panel-label">${esc(sec.label)}</div>`;

    const notams = sec.notams || [];
    const filtered = sec.filtered_out || [];

    if (notams.length === 0) {
      html += `<div class="no-data">No relevant NOTAMs</div>`;
    } else {
      const t1t2 = notams.filter(n => n.tier < 3);
      const t3   = notams.filter(n => n.tier === 3);
      t1t2.forEach(n => { html += notamRow(n, 0, `${sec.key}|${n.id}`); });
      if (t3.length <= 5) {
        t3.forEach(n => { html += notamRow(n, 0, `${sec.key}|${n.id}`); });
      } else {
        t3.slice(0, 5).forEach(n => { html += notamRow(n, 0, `${sec.key}|${n.id}`); });
        const uid = `t3-gen-${sec.key.replace(/\s/g, '_')}`;
        html += `<div id="${uid}-more" style="display:none">`;
        t3.slice(5).forEach(n => { html += notamRow(n, 0, `${sec.key}|${n.id}`); });
        html += `</div>
          <div class="t3-expand" onclick="expandT3('${uid}', this)">
            show ${t3.length - 5} more T3 ▾
          </div>`;
      }
    }

    if (filtered.length > 0) {
      const uid = `filt-gen-${sec.key.replace(/\s/g, '_')}`;
      html += `<div id="${uid}-more" style="display:none">`;
      filtered.forEach(n => { html += notamRow(n, 0, `${sec.key}|${n.id}`); });
      html += `</div>
        <div class="filtered-expand" onclick="expandT3('${uid}', this)">
          AI filtered out ${filtered.length} NOTAM${filtered.length > 1 ? 's' : ''} · tap to review ▾
        </div>`;
    }

    html += `</div>`;
  });

  return html;
}

function _updateFlightBadge(sections) {
  const allNotams = sections.flatMap(s => s.notams || []);
  const badge = document.getElementById('flightBadge');
  if (!badge) return;
  const t1count = allNotams.filter(n => n.tier === 1).length;
  const t2count = allNotams.filter(n => n.tier === 2).length;
  badge.className = '';
  if (t1count > 0) {
    badge.textContent = t1count;
    badge.className = 'badge-t1';
  } else if (t2count > 0) {
    badge.textContent = t2count;
    badge.className = 'badge-t2';
  }
}

// ── Icons ──────────────────────────────────────────────────────────────────
function circleIcon(color, size, ringColor) {
  const border = ringColor
    ? `3px solid ${ringColor}`
    : `2px solid rgba(255,255,255,0.5)`;
  return L.divIcon({
    className: "",
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;
      background:${color};border:${border};
      box-shadow:0 0 8px ${color}88;cursor:pointer;"></div>`,
    iconSize:   [size, size],
    iconAnchor: [size / 2, size / 2],
  });
}

function firIcon(color) {
  return L.divIcon({
    className: "",
    html: `<div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
             <div style="width:16px;height:16px;background:${color};
             transform:rotate(45deg);border:2px solid rgba(255,255,255,0.55);
             box-shadow:0 0 8px ${color}88;"></div></div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
  });
}

// ── Marker color: weather severity (RED/ORANGE/YELLOW/GREEN); role shown via ring ──
let depSet  = new Set();
let destSet = new Set();
let altnSet = new Set();

const WX_COLORS = { RED: "#ff5050", ORANGE: "#ff8c1a", YELLOW: "#ffd23f", GREEN: "#4cff91" };
const WX_RANK   = { GREEN: 0, YELLOW: 1, ORANGE: 2, RED: 3 };

function worstWxTier(legs) {
  return (legs || []).reduce(
    (worst, l) => (WX_RANK[l.wx_tier] > WX_RANK[worst] ? l.wx_tier : worst),
    "GREEN"
  );
}
function markerColor(ap) {
  return WX_COLORS[worstWxTier(ap.legs)];
}
function wxTag(tier) {
  const color = WX_COLORS[tier] || WX_COLORS.YELLOW;
  return `<span class="wx-tag" style="color:${color}">&#9679; ${esc(tier || "YELLOW")}</span>`;
}
function roleRing(icao) {
  if (depSet.has(icao) || destSet.has(icao)) return "#ffffff";  // white ring = dep/dest/turnaround
  if (altnSet.has(icao))                     return "#d060a0";  // pink ring = alternate
  return null;                                                   // enroute: no ring
}
function markerSize(icao) {
  return (depSet.has(icao) || destSet.has(icao)) ? 26 : 20;
}
function markerZIndex(icao) {
  return (depSet.has(icao) || destSet.has(icao)) ? 100 : 0;
}

// ── Header airport shortcut buttons ──────────────────────────────────────
function renderHeaderAirportBtns(airports, legs) {
  const apMap = Object.fromEntries(airports.map(a => [a.icao, a]));
  const seen  = new Set();
  const ordered = [];

  // 1. Dep/dest in leg order, deduped (white — matches the role-ring convention;
  //    green is reserved for GREEN/good weather on the map markers)
  legs.forEach(l => {
    [l.dep, l.dest].forEach(icao => {
      if (icao && !seen.has(icao) && apMap[icao]) {
        ordered.push({ ap: apMap[icao], color: '#ffffff' });
        seen.add(icao);
      }
    });
  });

  // 2. Alternates from OFP data (dark pink): primary dest_altn only, all era/rcf
  const pinkIcaos = [];
  legs.forEach(l => {
    if (l.dest_altn && l.dest_altn[0]) pinkIcaos.push(l.dest_altn[0]);
    (l.era       || []).forEach(ic => pinkIcaos.push(ic));
    if (l.rcf_dest) pinkIcaos.push(l.rcf_dest);
    (l.rcf_altn  || []).forEach(ic => pinkIcaos.push(ic));
  });
  pinkIcaos.forEach(icao => {
    if (!seen.has(icao) && apMap[icao]) {
      ordered.push({ ap: apMap[icao], color: '#d060a0' });
      seen.add(icao);
    }
  });

  const actions   = document.getElementById('header-actions');
  const flightBtn = document.getElementById('flightBtn');
  ordered.forEach(({ ap, color }) => {
    const btn = document.createElement('button');
    btn.className   = 'ap-btn';
    btn.textContent = ap.icao;
    btn.title       = ap.name || ap.icao;
    btn.style.color = color;
    btn.onclick     = () => { openPanel(ap); focusAirport(ap.lat, ap.lon); };
    actions.insertBefore(btn, flightBtn);
  });
}

// ── Source Pane data (original MET + NOTAM PDF pages + click-to-highlight
//   anchors). Each document loads independently — a run missing one JSON
//   (rendering failure, legacy run, MVP demo) just keeps that Document
//   Section hidden (.src-doc-hidden) instead of losing the whole pane. The
//   DOC button appears as soon as either document loads.
function _fetchSrcDoc(doc, filename) {
  fetch(DATA(filename)).then(r => r.ok ? r.json() : null).then(data => {
    if (!data) return;
    const d = _srcPane.docs[doc];
    d.anchors   = data.anchors || {};
    d.pageSizes = data.page_sizes || [];
    d.pages     = data.pages || 0;
    document.getElementById(`srcSection-${doc}`).classList.remove('src-doc-hidden');
    document.getElementById("docBtn").style.display = "";
  }).catch(() => {});
}
_fetchSrcDoc('met', 'met_anchors.json');
_fetchSrcDoc('notam', 'notam_anchors.json');

// ── Dropped-airport warnings (e.g. MET PDF airport with no known coords) ───
fetch(DATA("warnings.json")).then(r => r.ok ? r.json() : []).then(warnings => {
  if (!warnings || !warnings.length) return;
  const banner = document.getElementById('warnBanner');
  document.getElementById('warnBannerText').textContent =
    `⚠ ${warnings.length} airport${warnings.length > 1 ? 's' : ''} could not be shown: ${warnings.join('; ')}`;
  banner.classList.add('show');
}).catch(() => {});

// ── Main data loading ──────────────────────────────────────────────────────
Promise.all([
  fetch(DATA("flight_info.json")).then(r => r.ok ? r.json() : {}).catch(() => ({})),
  fetch(DATA("airports.json")).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
]).then(([fi, airports]) => {
  // Support legacy flat format (dep/dest as direct strings)
  const legs = fi.legs || (fi.dep ? [{leg:1, dep:fi.dep, dest:fi.dest,
    flight:fi.flight, date:fi.date, acft:fi.acft, reg:fi.reg}] : []);

  legs.forEach(l => {
    if (l.dep)  depSet.add(l.dep);
    if (l.dest) destSet.add(l.dest);
    if (l.dest_altn && l.dest_altn[0]) altnSet.add(l.dest_altn[0]);
  });

  // Header: show all legs
  if (legs.length > 0) {
    const title = legs.map(l => `${l.flight} ${l.dep}→${l.dest}`).join("  ·  ");
    document.getElementById("hdr-title").textContent = title;
    const l0 = legs[0];
    document.getElementById("hdr-sub").textContent =
      l0.date ? `${l0.date} · ${l0.acft} · ${l0.reg}` : "";
    document.title = legs.map(l => l.flight).join(" / ") + " Preflight Briefing";
  }

  // Fetch route polylines for each leg in this group
  const routePromises = [];
  for (let i = 1; i <= Math.max(legs.length, 1); i++) {
    routePromises.push(
      fetch(DATA(`route_${i}.json`)).then(r => r.json()).then(wps => ({ i, wps })).catch(() => null)
    );
  }
  Promise.all(routePromises).then(results => {
    let totalWpts = 0;
    let firstBounds = null;
    results.filter(Boolean).forEach(({ i, wps }) => {
      const lls = wps.map(w => [w.lat, w.lon]);
      const color = ROUTE_COLORS[i - 1] || ROUTE_COLORS[0];
      L.polyline(lls, { color, weight: 2.5, opacity: 0.85 }).addTo(map);
      totalWpts += wps.length;
      if (i === 1 && lls.length) firstBounds = L.latLngBounds(lls);
    });
    if (firstBounds) map.fitBounds(firstBounds, { padding: [40, 40] });
    document.getElementById("status").textContent =
      results.filter(Boolean).length > 1
        ? `${results.filter(Boolean).length} legs · ${totalWpts} waypoints`
        : `Route: ${totalWpts} waypoints`;
  });

  _navAirports = airports;

  // Airport markers
  airports.forEach(ap => {
    const color  = markerColor(ap);
    const ring   = roleRing(ap.icao);
    const size   = markerSize(ap.icao);
    const zIndex = markerZIndex(ap.icao);
    const icon   = circleIcon(color, size, ring);
    const offset = size > 20 ? [0, -12] : [0, -9];
    L.marker([ap.lat, ap.lon], { icon, zIndexOffset: zIndex })
      .bindTooltip(ap.icao, { direction: "top", offset })
      .on("click", () => openPanel(ap))
      .addTo(map);
  });

  renderHeaderAirportBtns(airports, legs);

}).catch(e => {
  console.error("Data load failed:", e);
  document.getElementById("status").textContent = "Load failed: " + e.message;
});

// ── General / flight-wide NOTAMs ──────────────────────────────────────────
fetch(DATA("general_notams.json"))
  .then(r => r.ok ? r.json() : null)
  .then(sections => {
    if (!sections) return;  // absent on legacy / MVP runs — silently ignore
    _generalNotams = sections;
    _updateFlightBadge(sections);
  })
  .catch(() => {});

// ── FIR markers ───────────────────────────────────────────────────────────
fetch(DATA("fir_notams.json"))
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(firs => {
    _navFirs = [];
    firs.forEach(f => {
      // Support both new `legs` schema and legacy flat schema
      const legs = f.legs || [{leg:1, ref_time:f.ref_time, notams:f.notams||[]}];
      const allFirNotams = legs.flatMap(l => l.notams || []);
      if (!allFirNotams.length) return;

      _navFirs.push(f);
      const color = allFirNotams.some(n => n.tier <= 2) ? "#c8a800" : "#1a1a2e";
      const tip   = `${f.fir} — ${f.name} (${allFirNotams.length})`;
      L.marker([f.lat, f.lon], { icon: firIcon(color), zIndexOffset: 50 })
        .bindTooltip(tip, { direction: "top", offset: [0, -8] })
        .on("click", () => openPanel(f, "fir"))
        .addTo(map);
    });
  })
  .catch(e => console.error("FIR load failed:", e));
</script>
