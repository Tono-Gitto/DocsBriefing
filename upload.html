<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preflight Briefing Decoder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 2.5rem 3rem;
      width: 100%;
      max-width: 520px;
    }
    h1 { color: #58a6ff; font-size: 1.4rem; margin: 0 0 0.3rem; }
    .subtitle { color: #8b949e; font-size: 0.875rem; margin: 0 0 2rem; }
    .field { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #c9d1d9;
      margin-bottom: 0.35rem;
    }
    label span { color: #8b949e; font-weight: 400; }
    input[type="file"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      cursor: pointer;
    }
    input[type="file"]:hover { border-color: #58a6ff; }
    button[type="submit"] {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: #2ea043; }
    .ofp-slot { position: relative; }
    .btn-remove-leg {
      position: absolute; right: 0; top: 0;
      background: none; border: none;
      color: #6e7681; font-size: 1rem; cursor: pointer;
      padding: 0 4px; line-height: 1.4rem;
    }
    .btn-remove-leg:hover { color: #f85149; }
    .btn-add-leg {
      display: block; width: 100%;
      margin-bottom: 0.5rem; padding: 0.5rem;
      background: #0d1117; color: #58a6ff;
      border: 1px dashed #30363d;
      border-radius: 6px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; text-align: center;
    }
    .btn-add-leg:hover { border-color: #58a6ff; background: #161b22; }
    .btn-add-leg:disabled { color: #444; border-color: #222; cursor: default; }
    .note {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: #6e7681;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Preflight Briefing Decoder</h1>
    <p class="subtitle">Thai Airways B777 — select dispatch PDFs (1–4 legs per duty)</p>

    <form method="POST" action="/upload" enctype="multipart/form-data">
      <div id="ofp-slots">
        <div class="field ofp-slot" id="ofp-slot-1">
          <label>OFP Leg 1 <span>— Operational Flight Plan</span></label>
          <input type="file" name="ofp_1" accept=".pdf" required>
        </div>
      </div>

      <button type="button" class="btn-add-leg" id="btn-add-leg" onclick="addLeg()">+ Add leg</button>

      <div class="field">
        <label>MET <span>— Dispatch Weather Package</span></label>
        <input type="file" name="met" accept=".pdf" required>
      </div>
      <div class="field">
        <label>NOTAM <span>— Official Pilot Briefing</span></label>
        <input type="file" name="notam" accept=".pdf" required>
      </div>
      <button type="submit">Process Duty</button>
    </form>

    <p class="note">
      Processing takes ~2 minutes per leg (AI NOTAM summaries).<br>
      3–4 OFPs open two map tabs (legs 1–2 and legs 3–4).
    </p>
  </div>

  <script>
    let legCount = 1;

    function addLeg() {
      if (legCount >= 4) return;
      legCount++;
      const slots = document.getElementById("ofp-slots");
      const div = document.createElement("div");
      div.className = "field ofp-slot";
      div.id = `ofp-slot-${legCount}`;
      div.innerHTML = `
        <label>OFP Leg ${legCount} <span>— Operational Flight Plan</span>
          <button type="button" class="btn-remove-leg" onclick="removeLeg(${legCount})" title="Remove">✕</button>
        </label>
        <input type="file" name="ofp_${legCount}" accept=".pdf">`;
      slots.appendChild(div);
      if (legCount >= 4) document.getElementById("btn-add-leg").disabled = true;
    }

    function removeLeg(n) {
      const slot = document.getElementById(`ofp-slot-${n}`);
      if (slot) slot.remove();
      // Re-number remaining slots so names stay sequential
      legCount = 0;
      document.querySelectorAll(".ofp-slot").forEach(s => {
        legCount++;
        s.id = `ofp-slot-${legCount}`;
        const input = s.querySelector("input");
        input.name = `ofp_${legCount}`;
        const label = s.querySelector("label");
        // Update only the visible text, preserving the remove button
        const btn = label.querySelector("button");
        label.childNodes[0].textContent = `OFP Leg ${legCount} `;
        if (btn) btn.setAttribute("onclick", `removeLeg(${legCount})`);
        // First slot has no remove button
        if (legCount === 1 && btn) btn.remove();
      });
      document.getElementById("btn-add-leg").disabled = false;
    }
  </script>
</body>
</html>
